name: YouTube to Facebook

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube Video URL'
        required: true
      caption:
        description: 'Facebook Caption (optional)'
        required: false
        default: ''

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install pytubefix requests
          sudo apt-get install -y ffmpeg

      - name: Download Video
        run: |
          python -c "
          from pytubefix import YouTube
          url = '${{ github.event.inputs.youtube_url }}'
          yt = YouTube(url)
          stream = yt.streams.get_highest_resolution()
          stream.download(filename='video.mp4')
          print('Downloaded:', yt.title)
          "

      - name: Apply Vintage Effect
        run: |
          ffmpeg -i video.mp4 \
            -vf "curves=vintage,hue=s=0.7,vignette" \
            -c:a copy video_vintage.mp4

      - name: Upload to Facebook
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          YOUTUBE_URL: ${{ github.event.inputs.youtube_url }}
          CAPTION: ${{ github.event.inputs.caption }}
        run: python upload_fb.py
