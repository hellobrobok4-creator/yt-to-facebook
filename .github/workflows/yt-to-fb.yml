name: YouTube to Facebook

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube Video URL'
        required: true
      caption:
        description: 'Facebook Caption (optional)'
        required: false
        default: ''

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install requests
          sudo apt-get install -y ffmpeg

      - name: Download Video
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          YOUTUBE_URL: ${{ github.event.inputs.youtube_url }}
        run: |
          python - <<'EOF'
          import requests
          import os
          import re

          url = os.environ["YOUTUBE_URL"]
          video_id = re.search(r"(?:v=|shorts/)([a-zA-Z0-9_-]{11})", url)
          if not video_id:
              print("Invalid URL")
              exit(1)
          video_id = video_id.group(1)

          headers = {
              "X-RapidAPI-Key": os.environ["RAPIDAPI_KEY"],
              "X-RapidAPI-Host": "yt-api.p.rapidapi.com"
          }

          res = requests.get(
              f"https://yt-api.p.rapidapi.com/dl?id={video_id}",
              headers=headers
          ).json()

          formats = res.get("formats", [])
          mp4_formats = [f for f in formats if f.get("mimeType","").startswith("video/mp4") and f.get("url")]
          
          if not mp4_formats:
              print("No MP4 format found")
              exit(1)

          best = sorted(mp4_formats, key=lambda x: int(x.get("qualityLabel","0p").replace("p","")), reverse=True)[0]
          download_url = best["url"]

          print(f"Downloading: {download_url[:50]}...")
          r = requests.get(download_url, stream=True)
          with open("video.mp4", "wb") as f:
              for chunk in r.iter_content(chunk_size=8192):
                  f.write(chunk)
          print("Download complete!")
          EOF

      - name: Apply Vintage Effect
        run: |
          ffmpeg -i video.mp4 \
            -vf "curves=vintage,hue=s=0.7,vignette" \
            -c:a copy video_vintage.mp4

      - name: Upload to Facebook
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          YOUTUBE_URL: ${{ github.event.inputs.youtube_url }}
          CAPTION: ${{ github.event.inputs.caption }}
        run: python upload_fb.py
